<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Habit Seedling</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fffaf0;
      --card: #ffffff;
      --ink: #24352b;
      --muted: #5f6f65;
      --accent: #5f9f6e;
      --line: #dfe8d9;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(44, 74, 52, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Habit Seedling</h1>
      <p>A local-first habit and task tracker for Android.</p>
      <a href="./privacy-policy/">Privacy Policy</a>
    </section>
  </main>
</body>
</html>
